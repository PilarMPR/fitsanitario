<style>/* ===== FitSanitario — design system tokens & components (from DS) ===== */
:root{
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --fs-cap:14px;--fs-body:18px;--fs-lead:20px;--fs-h3:22px;--fs-h2:26px;--fs-h1:32px;
  --sp1:8px;--sp2:16px;--sp3:24px;--sp4:32px;--sp5:40px;
  --r-s:10px;--r-m:16px;--r-l:24px;--r-pill:999px;--touch:48px;
  --shadow:0 6px 22px rgba(8,30,28,.12);
}
[data-theme="light"]{
  --bg:#EAF1EF;--surface:#FFFFFF;--surface-2:#F3F8F6;--border:#D3DFDC;
  --text:#10201D;--text-2:#46554F;--text-inv:#FFFFFF;
  --primary:#0A6E63;--primary-weak:#D6ECE7;--primary-strong:#075A51;
  --challenge:#A85E08;--challenge-weak:#FBEAD2;--challenge-strong:#834908;
  --social:#4842B0;--social-weak:#E5E3FA;--social-strong:#372F93;
  --success:#1E7A4D;--alert:#B3261E;--gold:#9A7400;
  --skel:#DFE7E5;--skel-hi:#F1F6F4;
}
[data-theme="dark"]{
  --bg:#0D1413;--surface:#16211E;--surface-2:#1F2C29;--border:#2C3B37;
  --text:#E9F2EF;--text-2:#A6B5B0;--text-inv:#07110F;
  --primary:#31CBB6;--primary-weak:#0F3A35;--primary-strong:#5CDBCA;
  --challenge:#F1A33E;--challenge-weak:#37280F;--challenge-strong:#F7BB66;
  --social:#9B93F3;--social-weak:#221F49;--social-strong:#B6AFF8;
  --success:#55C98C;--alert:#F2685F;--gold:#E0B84E;
  --skel:#23332F;--skel-hi:#2E403B;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:var(--font);line-height:1.45;-webkit-font-smoothing:antialiased}
.h1{margin:0;font-size:var(--fs-h1);font-weight:800;letter-spacing:-.02em}
.h2{margin:0;font-size:var(--fs-h2);font-weight:800;letter-spacing:-.01em}
.h3{margin:0;font-size:var(--fs-h3);font-weight:700}
.body{margin:0;font-size:var(--fs-body)}
.cap{margin:0;font-size:var(--fs-cap);color:var(--text-2)}
.muted{color:var(--text-2)}
.stack{display:flex;flex-direction:column;gap:var(--sp2)}
.stack-s{display:flex;flex-direction:column;gap:var(--sp1)}
.row{display:flex;align-items:center;gap:var(--sp1)}
.between{display:flex;align-items:center;justify-content:space-between;gap:var(--sp1)}
.wrap{flex-wrap:wrap}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-m);padding:var(--sp2)}
.panel-2{background:var(--surface-2)}
.btn{appearance:none;border:0;cursor:pointer;font-family:var(--font);font-size:var(--fs-body);font-weight:700;
  min-height:var(--touch);padding:0 var(--sp3);border-radius:var(--r-pill);background:var(--primary);color:var(--text-inv);
  display:inline-flex;align-items:center;justify-content:center;gap:10px;transition:transform .12s ease,filter .12s ease}
.btn:hover{filter:brightness(1.06)}.btn:active{transform:scale(.97)}
.btn svg{width:22px;height:22px;flex:none}
.btn--block{width:100%}
.btn--lg{min-height:56px;font-size:var(--fs-lead)}
.btn--ghost{background:transparent;color:var(--primary);border:2px solid var(--primary)}
.btn--challenge{background:var(--challenge)}
.btn--soft{background:var(--primary-weak);color:var(--primary-strong)}
:focus-visible{outline:3px solid var(--primary);outline-offset:3px;border-radius:6px}
.app :focus-visible{outline-offset:-3px}
.badge{display:inline-flex;align-items:center;gap:6px;font:800 12px var(--font);letter-spacing:.04em;
  padding:5px 11px;border-radius:var(--r-pill);text-transform:uppercase}
.badge svg{width:14px;height:14px}
.badge--primary{background:var(--primary-weak);color:var(--primary-strong)}
.badge--challenge{background:var(--challenge-weak);color:var(--challenge-strong)}
.badge--social{background:var(--social-weak);color:var(--social-strong)}
.badge--team{background:var(--social-weak);color:var(--social-strong)}
.badge--new{background:var(--alert);color:#fff;animation:fadeNew 3.2s ease forwards}
.pill{display:inline-flex;align-items:center;gap:6px;font:700 13px var(--font);padding:6px 12px;border-radius:var(--r-pill);
  background:var(--surface-2);color:var(--text-2);border:1px solid var(--border)}
.pill svg{width:15px;height:15px}
.chip{font:700 12px var(--font);padding:5px 10px;border-radius:var(--r-pill);background:var(--surface-2);color:var(--text-2);border:1px solid var(--border)}
/* segmented */
.seg{position:relative;display:grid;grid-auto-flow:column;grid-auto-columns:1fr;background:var(--surface-2);
  border:1px solid var(--border);border-radius:var(--r-pill);padding:5px;min-height:var(--touch)}
.seg__ind{position:absolute;top:5px;bottom:5px;border-radius:var(--r-pill);background:var(--primary);
  box-shadow:0 3px 10px rgba(0,0,0,.18);transition:transform .26s cubic-bezier(.4,1.1,.5,1),width .26s ease;z-index:0}
.seg__b{position:relative;z-index:1;appearance:none;border:0;background:transparent;cursor:pointer;
  font:700 var(--fs-cap)/1 var(--font);color:var(--text-2);display:flex;align-items:center;justify-content:center;gap:8px;
  border-radius:var(--r-pill);min-height:38px;padding:0 8px}
.seg__b svg{width:18px;height:18px}

    mouth='<path d="M20 29 q4 5 8 0" fill="none" stroke="#7a3b2e" stroke-width="2.4" stroke-linecap="round"/>'; }
  else if(expr==='determined'){ eyes='<rect x="19" y="23" width="3.6" height="2.6" rx="1" fill="#1a1a1a"/><rect x="25.4" y="23" width="3.6" height="2.6" rx="1" fill="#1a1a1a"/>';
    brows='<rect x="18.6" y="20.4" width="4.4" height="1.8" rx="1" fill="'+hc+'" transform="rotate(10 20.8 21)"/><rect x="25" y="20.4" width="4.4" height="1.8" rx="1" fill="'+hc+'" transform="rotate(-10 27.2 21)"/>';

function hydrateAvatars(root){

/* ===== Avatar editor ===== */
var AV_SETS={
  bg:["#D6ECE7","#FBEAD2","#E5E3FA","#FADAD6","#E7EFD6"],
  skin:["#F0C8A0","#E0A878","#C68642","#8D5524","#5C3A21"],
  hair:[["short","#3A2A1A"],["short","#7a7a7a"],["long","#1c1c1c"],["long","#9a5b2a"],["bun","#6b3f1d"],["bald","#3A2A1A"]],
  clothes:["#0A6E63","#4842B0","#A85E08","#B3261E","#1E7A4D","#2C3B37"],
  glasses:[false,true],
  beard:[false,true],
  headwear:["none","cap","band","beanie"],
  expr:["neutral","smile","determined"]
};
var AV_LAYERS=[
  {k:"bg",label:"Fondo"},
  {k:"skin",label:"Piel"},
  {k:"hair",label:"Pelo"},
  {k:"clothes",label:"Ropa"},
  {k:"glasses",label:"Gafas"},
  {k:"beard",label:"Barba"},
  {k:"headwear",label:"Cabeza"},
  {k:"expr",label:"Expresión"}
];
var AV_HEAD_ICON={none:'∅',cap:'🧢',band:'🎽',beanie:'🎿'};
var AV_EXPR_LABEL={neutral:'😐',smile:'🙂',determined:'😤'};

/* Build the editor body into `mount`, editing a clone of `cfg`. onSave receives the new cfg. */
function buildAvatarEditor(mount, baseCfg, opts){
  opts=opts||{};
  var cfg=Object.assign({size:140,bg:"#D6ECE7",skin:"#E0A878",hair:"short",hairColor:"#3A2A1A",clothes:"#0A6E63",headwear:"cap",expr:"smile",glasses:false,beard:false}, baseCfg);
  cfg.size=150;
  var active="bg";
  mount.innerHTML=
    '<div class="between"><p class="h2">'+(opts.title||'Edita tu avatar')+'</p><span class="badge badge--primary">Vivo</span></div>'
    +'<div class="panel" style="display:flex;justify-content:center"><span id="av-prev"></span></div>'
    +'<div class="grid" id="av-tabs" role="tablist" aria-label="Capa"></div>'
    +'<div class="grid" id="av-opts"></div>'
    +'<p class="cap">Toque ≥48px · previsualización en vivo. Capas: fondo, piel, pelo, ropa, gafas, barba, cabeza y expresión.</p>'
    +'<button class="btn btn--block btn--lg" id="av-save">'+(opts.saveLabel||'Guardar avatar')+'</button>';
  var prev=mount.querySelector('#av-prev'), tabs=mount.querySelector('#av-tabs'), box=mount.querySelector('#av-opts');
  function draw(){prev.innerHTML=renderAvatar(cfg);}
  function paintTabs(){
    tabs.innerHTML='';
    AV_LAYERS.forEach(function(L){
      var b=document.createElement('button');
      b.className='chip';b.style.minHeight='44px';b.style.padding='0 14px';b.style.cursor='pointer';
      b.textContent=L.label;b.setAttribute('role','tab');
      if(L.k===active){b.style.background='var(--primary)';b.style.color='var(--text-inv)';b.style.borderColor='var(--primary)';b.setAttribute('aria-selected','true');}
      else b.setAttribute('aria-selected','false');
      b.onclick=function(){active=L.k;paintTabs();paintOpts();};
      tabs.appendChild(b);
    });
  }
  function paintOpts(){
    box.innerHTML='';
    var set=AV_SETS[active];
    set.forEach(function(v){
      var b=document.createElement('button');b.className='opt';
      var on=false;
      if(active==='bg'){b.style.background=v;on=cfg.bg===v;b.onclick=function(){cfg.bg=v;commit('bg');};b.setAttribute('aria-label','Fondo');}
      else if(active==='skin'){b.style.background=v;on=cfg.skin===v;b.onclick=function(){cfg.skin=v;commit('skin');};b.setAttribute('aria-label','Piel');}
      else if(active==='clothes'){b.style.background=v;on=cfg.clothes===v;b.onclick=function(){cfg.clothes=v;commit('clothes');};b.setAttribute('aria-label','Ropa');}
      else if(active==='hair'){b.innerHTML=renderAvatar({size:42,hair:v[0],hairColor:v[1],bg:'#fff'});on=cfg.hair===v[0]&&cfg.hairColor===v[1];b.onclick=function(){cfg.hair=v[0];cfg.hairColor=v[1];commit('hair');};b.setAttribute('aria-label','Pelo');}
      else if(active==='headwear'){b.textContent=AV_HEAD_ICON[v];on=cfg.headwear===v;b.onclick=function(){cfg.headwear=v;commit('headwear');};b.setAttribute('aria-label','Cabeza');}
      else if(active==='expr'){b.textContent=AV_EXPR_LABEL[v];on=cfg.expr===v;b.onclick=function(){cfg.expr=v;commit('expr');};b.setAttribute('aria-label','Expresión');}
      else if(active==='glasses'){b.textContent=v?'👓':'∅';on=cfg.glasses===v;b.onclick=function(){cfg.glasses=v;commit('glasses');};b.setAttribute('aria-label','Gafas');}
      else if(active==='beard'){b.textContent=v?'🧔':'∅';on=cfg.beard===v;b.onclick=function(){cfg.beard=v;commit('beard');};b.setAttribute('aria-label','Barba');}
      b.setAttribute('aria-pressed',on?'true':'false');
      box.appendChild(b);
    });
  }
  function commit(){draw();paintOpts();}
  mount.querySelector('#av-save').onclick=function(){
    var out=Object.assign({},cfg);delete out.size;
    if(opts.onSave) opts.onSave(out);
  };
  draw();paintTabs();paintOpts();
}
window.renderAvatar=renderAvatar;
window.hydrateAvatars=hydrateAvatars;
window.buildAvatarEditor=buildAvatarEditor;

<script>
/* ===== FitSanitario — cinematic FX layer (confetti + celebrations) ===== */
(function(){
  'use strict';
  var PAL = {
    primary:    ['#0A6E63','#13a08f','#9fe7da','#E0B400','#ffffff'],
    individual: ['#0A6E63','#13a08f','#9fe7da','#E0B400','#ffffff'],
    express:    ['#A85E08','#C57708','#E0B400','#FBEAD2','#ffffff'],
    team:       ['#4842B0','#6a63d8','#b6b1f0','#E0B400','#ffffff']
  };
  var mount=null, canvas=null, ctx=null, parts=[], raf=null, DPR=Math.min(window.devicePixelRatio||1,2);

  function host(){
    mount=document.getElementById('app');
    if(!mount) return false;
    if(canvas && canvas.parentNode===mount) return true;
    canvas=document.createElement('canvas');
    canvas.className='fx-canvas';
    canvas.setAttribute('aria-hidden','true');
    mount.appendChild(canvas);
    ctx=canvas.getContext('2d');
    resize();
    window.addEventListener('resize', resize);
    return true;
  }
  function resize(){
    if(!mount||!canvas) return;
    var r=mount.getBoundingClientRect();
    canvas.width=Math.round(r.width*DPR);
    canvas.height=Math.round(r.height*DPR);
    canvas.style.width=r.width+'px';
    canvas.style.height=r.height+'px';
  }
  function rnd(a,b){ return a+Math.random()*(b-a); }
  function pick(a){ return a[(Math.random()*a.length)|0]; }

  function spawn(x,y,vx,vy,pal){
    parts.push({
      x:x*DPR, y:y*DPR,
      vx:vx*DPR, vy:vy*DPR,
      g:rnd(0.28,0.42)*DPR,
      drag:rnd(0.984,0.992),
      rot:rnd(0,Math.PI*2), vr:rnd(-0.32,0.32),
      s:rnd(6,13)*DPR, ar:rnd(0.45,1),
      shape:Math.random()<0.5?0:(Math.random()<0.6?1:2),
      color:pick(pal),
      life:0, max:rnd(70,120), wob:rnd(0,6.28), wobS:rnd(0.05,0.13)
    });
  }
  function loop(){
    raf=null;
    if(!ctx) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(var i=parts.length-1;i>=0;i--){
      var p=parts[i];
      p.life++;
      p.vy+=p.g; p.vx*=p.drag; p.vy*=p.drag;
      p.wob+=p.wobS;
      p.x+=p.vx+Math.sin(p.wob)*0.6*DPR; p.y+=p.vy;
      p.rot+=p.vr;
      var t=p.life/p.max, alpha=t<0.7?1:Math.max(0,1-(t-0.7)/0.3);
      if(p.life>=p.max || p.y>canvas.height+40*DPR){ parts.splice(i,1); continue; }
      ctx.save();
      ctx.globalAlpha=alpha;
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle=p.color;
      var w=p.s, h=p.s*p.ar*(p.shape===2?1:Math.abs(Math.cos(p.wob))*0.7+0.5);
      if(p.shape===1){ ctx.beginPath(); ctx.arc(0,0,p.s*0.5,0,6.283); ctx.fill(); }
      else { ctx.fillRect(-w/2,-h/2,w,h); }
      ctx.restore();
    }
    if(parts.length) raf=requestAnimationFrame(loop);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  function run(){ if(!raf) raf=requestAnimationFrame(loop); }

  function rain(pal,count){
    if(!host()) return;
    var r=mount.getBoundingClientRect(), W=r.width;
    for(var i=0;i<count;i++){
      spawn(rnd(0,W), rnd(-30,-4), rnd(-2.2,2.2), rnd(1.5,4.5), pal);
    }
    run();
  }
  function burst(cx,cy,pal,count,power){
    if(!host()) return;
    for(var i=0;i<count;i++){
      var a=rnd(0,Math.PI*2), sp=rnd(2,power);
      spawn(cx,cy, Math.cos(a)*sp, Math.sin(a)*sp-rnd(2,6), pal);
    }
    run();
  }

  function flash(pal){
    if(!mount) return;
    var f=document.createElement('div'); f.className='fx-flash';
    f.style.setProperty('--c1', pal[1]); f.style.setProperty('--c2', pal[0]);
    mount.appendChild(f);
    setTimeout(function(){ f.remove(); }, 720);
  }
  function pop(){
    if(!mount) return;
    mount.classList.remove('fx-shake'); void mount.offsetWidth; mount.classList.add('fx-shake');
    setTimeout(function(){ mount.classList.remove('fx-shake'); }, 620);
  }

  window.FX = {
    init: host,
    celebrate: function(type){
      if(!host()) return;
      var pal=PAL[type]||PAL.primary;
      var r=mount.getBoundingClientRect();
      flash(pal); pop();
      // cannon from two lower corners + a top shower
      burst(r.width*0.22, r.height*0.62, pal, 36, 13);
      burst(r.width*0.78, r.height*0.62, pal, 36, 13);
      setTimeout(function(){ rain(pal, 46); }, 90);
      setTimeout(function(){ burst(r.width*0.5, r.height*0.5, pal, 28, 11); }, 220);
    },
    burstCard: function(el){
      if(!host()||!el) return;
      var ar=mount.getBoundingClientRect(), r=el.getBoundingClientRect();
      var cx=r.left-ar.left+r.width*0.78, cy=r.top-ar.top+r.height*0.5;
      burst(cx, cy, PAL.primary, 22, 9);
    },
    welcome: function(){ this.celebrate('primary'); }
  };

  /* button ripples (event-delegated, survives re-renders) */
  document.addEventListener('pointerdown', function(e){
    var b=e.target.closest && e.target.closest('.btn');
    if(!b) return;
    var r=b.getBoundingClientRect();
    var d=Math.max(r.width,r.height)*1.1;
    var rp=document.createElement('span'); rp.className='rippl';
    rp.style.width=rp.style.height=d+'px';
    rp.style.left=(e.clientX-r.left)+'px';
    rp.style.top=(e.clientY-r.top)+'px';
    b.appendChild(rp);
    setTimeout(function(){ rp.remove(); }, 600);
  }, true);

  if(document.readyState!=='loading') host();
  else window.addEventListener('DOMContentLoaded', host);
})();

</script>

WIRE.ejercicio=function(){
  app.querySelectorAll('[data-wk]').forEach(function(b){b.onclick=function(){S.week=+b.dataset.wk;render();};});
  app.querySelectorAll('[data-mode]').forEach(function(b){b.onclick=function(){
    S.mode=b.dataset.mode; render();
  };});
  // the exercise card is interactive: opens the video + reps detail
  app.querySelectorAll('.exh[data-card]').forEach(function(card){
    var idx=+card.dataset.card;
    card.onclick=function(){ openExercise(idx); };
    card.onkeydown=function(ev){ if(ev.key==='Enter'||ev.key===' '){ ev.preventDefault(); openExercise(idx); } };
  });
  // quick series taps from the list don't bubble to the card
  app.querySelectorAll('.dot[data-ex]').forEach(function(d){ d.onclick=function(ev){ ev.stopPropagation(); tapSeries(+d.dataset.ex, +d.dataset.s, d); }; });
  var rs=$('#reto-start'); if(rs) rs.onclick=startReto;
  var ra=$('#reto-again'); if(ra) ra.onclick=startReto;
};
function tapSeries(exIdx, sIdx, dotEl){
  var e=S.ex[S.mode][exIdx];
  if(e.done>=e.series) return;
  if(sIdx!==e.done) return; // only the next series
  completeSeries(exIdx, dotEl);
}
/* shared completion: +1 series, fly-up points, rest popup or full-complete */
function completeSeries(exIdx, anchorEl, onAfter){
  var e=S.ex[S.mode][exIdx];
  if(e.done>=e.series) return;
  e.done++;
  if(e.done>=e.series){
    var card=app.querySelector('[data-card="'+exIdx+'"]')||anchorEl;
    flyPoints(card,'+'+e.pts); window.FX&&window.FX.burstCard(card);
    S.user.points+=e.pts; save();
    // overlay path keeps the open sheet; list path re-renders the list
    if(onAfter){ setTimeout(function(){ onAfter(true); checkAchievements(); }, 600); }
    else { setTimeout(function(){ render(); checkAchievements(); }, 600); }
  } else {
    save();
    if(onAfter){ onAfter(false); restPopup(e); }   // refresh sheet in place, rest popup on top
    else { render(); restPopup(e); }                // render list FIRST, then append rest popup to fresh #app
  }
}

/* video + reps detail \u2014 opened by tapping an interactive exercise card */
function openExercise(exIdx){
  openSheet(function(mount,close){
    function draw(){
      var e=S.ex[S.mode][exIdx];
      var complete=e.done>=e.series;
      var dots='';
      for(var i=0;i<e.series;i++){ dots+='<span class="dot is-static'+(i<e.done?' is-done':'')+'">'+(i+1)+'</span>'; }
      var action=complete
        ? '<button class="btn btn--soft btn--block btn--lg" id="ex-done"><span class="check" style="width:24px;height:24px">'+I.check+'</span> Ejercicio completado</button>'
        : '<button class="btn btn--block btn--lg" id="ex-do">Completar serie '+(e.done+1)+' · +'+e.pts+' pts</button>';
      mount.innerHTML=
        '<div class="between"><b class="h3">'+e.n+'</b><button class="ov__x" id="ex-x" style="position:static" aria-label="Cerrar">✕</button></div>'
        +'<div class="video" id="ex-video" style="aspect-ratio:4/3"><span class="video__tag badge badge--primary">'+e.zone+'</span>'
          +'<button class="video__play" id="ex-play" aria-label="Reproducir vídeo">'+I.play+'</button>'
          +'<div class="video__bar"><i id="ex-vbar"></i></div></div>'
        +'<div class="reps"><div class="reps__box"><div class="reps__n">'+e.reps+'</div><div class="reps__l">'+e.repsLabel+'</div></div>'
          +'<div class="reps__box"><div class="reps__n">'+e.series+'</div><div class="reps__l">series</div></div>'
          +'<div class="reps__box"><div class="reps__n">+'+e.pts+'</div><div class="reps__l">puntos</div></div></div>'
        +'<div class="between"><span class="cap">'+(complete?'Completado':'Serie '+(e.done+1)+' de '+e.series)+'</span><div class="dots">'+dots+'</div></div>'
        +action;
      $('#ex-x',mount).onclick=function(){ close(); render(); };
      var vid=$('#ex-video',mount), bar=$('#ex-vbar',mount), play=$('#ex-play',mount);
      play.onclick=function(){ playVideo(vid,bar); };
      var doBtn=$('#ex-do',mount); if(doBtn) doBtn.onclick=function(){ completeSeries(exIdx, doBtn, function(){ draw(); }); };
      var dn=$('#ex-done',mount); if(dn) dn.onclick=function(){ close(); render(); };
    }
    draw();
  },{center:true});
}
function playVideo(vid,bar){
  if(vid.dataset.playing==='1') return;
  vid.dataset.playing='1'; vid.classList.add('playing');
  var play=vid.querySelector('.video__play'); if(play) play.style.display='none';
  var t=vid.querySelector('.video__time'); if(!t){ t=document.createElement('span'); t.className='video__time'; vid.appendChild(t); }
  var sec=0, dur=8; t.textContent='0:00';
  var iv=setInterval(function(){
    sec++;
    if(sec>dur){ clearInterval(iv); vid.dataset.playing=''; vid.classList.remove('playing'); if(play)play.style.display=''; bar.style.width='0'; if(t)t.remove(); return; }
    bar.style.width=Math.round(sec/dur*100)+'%'; t.textContent='0:0'+sec;
  },650);
}

  return '<div class="fi'+teamCls+nw+'" data-feed="'+(i==null?'':i)+'"><span class="fi__av" data-av=\''+JSON.stringify(Object.assign({size:40},p.av))+'\'></span>'
    +'<div style="flex:1"><div class="between"><b>'+p.name+' ha compartido un logro</b><span class="cap">'+p.time+'</span></div>'
    +'<div class="fi__ach"><span class="fi__ai"'+aiStyle+'>'+achIcon(p.icon)+'</span><div><b>'+p.ach+'</b>'+teamBadge+badge+'</div></div>'
    +'<button class="cheer'+(p.cheered?' is-on':'')+'" data-cheer>👏 Animar <span class="cheer__n">'+p.cheers+'</span></button></div></div>';
}
function wireCheers(scope){
  if(!scope) return;
  scope.querySelectorAll('[data-cheer]').forEach(function(b){
    b.onclick=function(){
      var card=b.closest('[data-feed]'); var n=b.querySelector('.cheer__n');
      var idx=card&&card.dataset.feed!==''?+card.dataset.feed:0;
      var p=S.feed[idx]; if(!p) return;
      if(p.cheered){p.cheers--;p.cheered=false;b.classList.remove('is-on');}
      else{p.cheers++;p.cheered=true;b.classList.add('is-on');}
      n.textContent=p.cheers;
      b.classList.remove('bump');void b.offsetWidth;b.classList.add('bump');
      save();
    };
  });
}

/* ===================== OVERLAYS ===================== */
function clearOverlays(){ app.querySelectorAll('.backdrop,.fullov').forEach(function(n){n.remove();}); }
function openSheet(build, opts){
  opts=opts||{};
  var bd=document.createElement('div'); bd.className='backdrop'+(opts.center?' center':'');
  var sheet=document.createElement('div'); sheet.className='sheet';
  bd.appendChild(sheet); app.appendChild(bd);
  function close(){ bd.remove(); }
  bd.addEventListener('click',function(e){ if(e.target===bd) close(); });

  return {close:close, sheet:sheet};
}

/* Rest popup */

/* Reto guided full overlay */
function startReto(){
  var steps=[
    {n:'Marcha en el sitio', s:45},
    {n:'Círculos de hombro', s:40},
    {n:'Elevación de talones', s:40},
    {n:'Estiramiento lateral', s:35}
  ];
  var idx=0, ramp=276;
  var ov=document.createElement('div'); ov.className='fullov'; app.appendChild(ov);
  function close(){ if(iv)clearInterval(iv); ov.remove(); }
  var iv=null, remain=0;
  function paint(){
    var st=steps[idx]; remain=st.s;
    ov.innerHTML='<div class="scr" style="justify-content:center"><div class="ov stack">'
      +'<button class="ov__x" id="reto-x" aria-label="Salir del reto">✕</button>'
      +'<span class="badge badge--challenge" style="align-self:center">'+I.bolt+' Reto express</span>'
      +'<p class="cap" style="text-align:center">Ejercicio <b>'+(idx+1)+'</b> de '+steps.length+'</p>'
      +'<svg class="ring" viewBox="0 0 100 100"><circle class="bg" cx="50" cy="50" r="44"/><circle class="fg" id="reto-arc" cx="50" cy="50" r="44" stroke-dasharray="'+ramp+'" stroke-dashoffset="0"/></svg>'
      +'<p class="timer" id="reto-t">0:'+(st.s<10?'0':'')+st.s+'</p>'
      +'<p class="h3" style="text-align:center">'+st.n+'</p>'
      +'<div class="prog prog--ch"><i style="width:'+Math.round(idx/steps.length*100)+'%"></i></div>'
      +'<button class="btn btn--challenge btn--block btn--lg" id="reto-next">'+(idx<steps.length-1?'Siguiente ›':'Terminar reto')+'</button></div></div>';
    $('#reto-x',ov).onclick=close;
    $('#reto-next',ov).onclick=next;
    var arc=$('#reto-arc',ov), t=$('#reto-t',ov), total=st.s;
    if(iv)clearInterval(iv);
    iv=setInterval(function(){ remain--; if(remain<0)remain=0; t.textContent='0:'+(remain<10?'0':'')+remain; arc.style.strokeDashoffset=ramp*(1-remain/total); if(remain<=0){clearInterval(iv);} },1000);
  }
  function next(){ if(idx<steps.length-1){ idx++; paint(); } else { finish(); } }
  function finish(){
    if(iv)clearInterval(iv);
    if(!S.reto.done){ S.user.points+=S.retoPoints; S.reto.done=true; }
    save(); close();
    if(S.screen==='ejercicio') render();
    toast('¡Reto completado! +'+S.retoPoints+' pts'); window.FX&&window.FX.celebrate('express');
    setTimeout(checkAchievements,300);
  }
  paint();
}

/* ===================== helpers ===================== */
function rkRow(pos,name,pts,me){ return '<div class="rk'+(me?' rk--me':'')+'" data-tribe="'+name+'"><span class="rk__pos">'+pos+'</span><b>'+name+'</b><span class="rk__pts">'+pts+'</span></div>'; }
function privacyNote(){ return '<p class="cap">🔒 Solo se comparten logros. Tu progreso y datos de salud son privados.</p>'; }
function fmt(n){ return n.toLocaleString('es-ES'); }
function flyPoints(anchor, text){
  if(!anchor) return;
  var f=document.createElement('div'); f.className='flyup'; f.textContent=text;
  var r=anchor.getBoundingClientRect(), ar=app.getBoundingClientRect();
  f.style.left=(r.right-ar.left-60)+'px'; f.style.top=(r.top-ar.top+6)+'px';
  app.appendChild(f); setTimeout(function(){f.remove();},1200);
}
var toastTimer;
function toast(msg){
  var ex=$('.toast',app); if(ex)ex.remove();
  var t=document.createElement('div'); t.className='toast';
  t.innerHTML=I.check+'<span class="body">'+msg+'</span>'; app.appendChild(t);
  clearTimeout(toastTimer); toastTimer=setTimeout(function(){t.remove();},2600);
}
function checkAchievements(){
  // unlock "Día completo" already unlocked; unlock "Una semana" if streak grows etc. Demo: unlock Maratón when all casa+gym done
  var allCasa=modeDone('casa')===S.ex.casa.length, allGym=modeDone('gym')===S.ex.gym.length;
  maybeUnlock('mananero', S.reto.done);
  if(allCasa&&allGym) maybeUnlock('maraton', true);
}
function maybeUnlock(id,cond){
  if(!cond) return; var a=S.ach.find(function(x){return x.id===id;});
  if(a&&!a.unlocked){ a.unlocked=true; a.icon=({mananero:'bolt',maraton:'star'})[id]||'star'; save(); toast('¡Logro desbloqueado: '+a.name+'!'); window.FX&&window.FX.celebrate(a.type); }
}

/* ===================== live simulation ===================== */
var feedTimer=null, rankTimer=null;
var POOL=[
  {name:'Pedro', av:{photo:'av3.png',bg:'#E8EEF2'}, ach:'Sin aliento', icon:'bolt', team:false},
  {name:'Sofía', av:{photo:'av2.png',bg:'#E8EEF2'}, ach:'Día completo', icon:'home', team:false},
  {name:'Equipo Azul', av:{photo:'av5.png',bg:'#E8EEF2'}, ach:'Líder de tribu', icon:'team', team:true},
  {name:'Javier', av:{photo:'av3.png',bg:'#E8EEF2'}, ach:'Primer paso', icon:'star', team:false},
  {name:'Marta', av:{photo:'av1.png',bg:'#E8EEF2'}, ach:'Una semana', icon:'flame', team:false}
];
var poolIdx=0;
function syncLive(){
  // feed posts
  if(feedTimer) clearInterval(feedTimer);
  feedTimer=setInterval(function(){
    var src=POOL[poolIdx%POOL.length]; poolIdx++;
    var p=Object.assign({}, src, {time:'ahora', cheers:Math.floor(Math.random()*6), cheered:false, fresh:true});
    S.feed.unshift(p); if(S.feed.length>14) S.feed.pop();
    // age the previous "ahora"
    S.feed.forEach(function(x,i){ if(i>0 && x.time==='ahora') x.time='hace 1 min'; });
    save();
    if(S.screen==='social') prependFeed(p);
    else if(S.screen==='perfil') refreshPerfilFeed();
  }, 15000+Math.floor(Math.random()*5000));
  // ranking reorder
  if(rankTimer) clearInterval(rankTimer);
  rankTimer=setInterval(function(){
    S.tribes.forEach(function(t){ t.pts+=Math.floor(Math.random()*40); });
    S.tribes.sort(function(a,b){return b.pts-a.pts;});
    save();
    if(S.screen==='perfil' && S.opt.showRank) reorderTribes();
  }, 30000);
}
function prependFeed(p){
  var feed=$('#feed'); if(!feed) return;
  var wrap=document.createElement('div'); wrap.innerHTML=feedCard(p,0);
  var node=wrap.firstChild;
  // reindex existing
  feed.insertBefore(node, feed.firstChild);
  hydrateAvatars(node);
  reindexFeed(feed);
  wireCheers(feed);
}
function reindexFeed(feed){
  feed.querySelectorAll('[data-feed]').forEach(function(n,i){ n.dataset.feed=i; });
}
function refreshPerfilFeed(){
  var c=$('#perfil-feed'); if(!c) return; c.innerHTML=feedCard(S.feed[0],0); hydrateAvatars(c); wireCheers(c);
}
function reorderTribes(){
  var list=$('#tribe-list'); if(!list) return;
  // FLIP
  var rows=[].slice.call(list.querySelectorAll('[data-tribe]'));
  var first={}; rows.forEach(function(r){first[r.dataset.tribe]=r.getBoundingClientRect().top;});
  list.innerHTML=S.tribes.map(function(t,i){return rkRow('#'+(i+1), t.name, fmt(t.pts), t.me);}).join('');
  var newRows=[].slice.call(list.querySelectorAll('[data-tribe]'));
  newRows.forEach(function(r){
    var last=r.getBoundingClientRect().top, f=first[r.dataset.tribe];
    if(f!=null){ var dy=f-last; r.style.transform='translateY('+dy+'px)'; r.style.transition='none';
      requestAnimationFrame(function(){ r.style.transition=''; r.style.transform=''; }); }
  });
}

/* ===================== boot ===================== */
window.addEventListener('DOMContentLoaded', function(){
  S.theme=S.opt.dark?'dark':'light';
  if(!S.onboarded) S.screen='onboarding';
  render();
});

/* expose for debugging + tweaks */
var ACCENTS={
  teal:['#0A6E63','#075A51','#D6ECE7'],
  indigo:['#4842B0','#372F93','#E5E3FA'],
  verde:['#1E7A4D','#155C39','#D6EFE0'],
  ambar:['#A85E08','#834908','#FBEAD2']
};
function applyTweaks(t){
  t=t||{};
  var root=document.documentElement;
  // accent
  var a=ACCENTS[t.accent]||null;
  if(a){ root.style.setProperty('--primary',a[0]); root.style.setProperty('--primary-strong',a[1]); root.style.setProperty('--primary-weak',a[2]); }
  else { root.style.removeProperty('--primary'); root.style.removeProperty('--primary-strong'); root.style.removeProperty('--primary-weak'); }
  // text scale (legibilidad 45+)
  var sc=+t.textScale||1;
  var base={ '--fs-cap':14,'--fs-body':18,'--fs-lead':20,'--fs-h3':22,'--fs-h2':26,'--fs-h1':32 };
  Object.keys(base).forEach(function(k){ root.style.setProperty(k, Math.round(base[k]*sc)+'px'); });
  // theme
  if(typeof t.dark==='boolean'){ S.opt.dark=t.dark; S.theme=t.dark?'dark':'light'; }
  // ranking + reto points
  if(typeof t.pixel==='boolean') S.opt.pixel=t.pixel;
  if(typeof t.showRanking==='boolean') S.opt.showRank=t.showRanking;
  if(t.retoPoints!=null) S.retoPoints=+t.retoPoints;
  save();
  if(S.screen!=='onboarding') render(); else { applyTheme(); }
}
window.__fit={
  reset:function(){localStorage.removeItem('fitsani');S=defaults();applyTheme();render();},
  applyTweaks:applyTweaks,
  nav:function(scr){S.onboarded=true;S.screen=scr;render();$('#scr')&&($('#scr').scrollTop=0);}
};
})();

</script>
  <script>
  (function(){
    var TWEAKS = /*EDITMODE-BEGIN*/{
      "accent": "teal",
      "textScale": 1,
      "dark": false,
      "pixel": true,
      "showRanking": true,
      "retoPoints": 25
    }/*EDITMODE-END*/;

    var ACCENTS=[['teal','#0A6E63'],['indigo','#4842B0'],['verde','#1E7A4D'],['ambar','#A85E08']];
    var panel=document.getElementById('tweaks');

    function apply(){ if(window.__fit&&window.__fit.applyTweaks) window.__fit.applyTweaks(TWEAKS); }
    function persist(edits){ Object.assign(TWEAKS,edits); window.parent.postMessage({type:'__edit_mode_set_keys',edits:edits},'*'); apply(); build(); }

    function build(){
      panel.innerHTML=''
        +'<div class="tweaks__h"><b>Tweaks</b><button class="iconbtn" id="tw-close" aria-label="Cerrar">✕</button></div>'
        +'<div class="tw-row"><span class="tw-label">Tema</span>'
          +'<div class="seg" id="tw-theme"><span class="seg__ind" style="left:5px;width:calc(50% - 5px);transform:translateX('+(TWEAKS.dark?100:0)+'%)"></span>'
          +'<button class="seg__b" data-d="0" aria-selected="'+(!TWEAKS.dark)+'">Claro</button>'
          +'<button class="seg__b" data-d="1" aria-selected="'+(TWEAKS.dark)+'">Oscuro</button></div></div>'
        +'<div class="tw-row"><span class="tw-label">Color de acento</span><div class="tw-sw" id="tw-accent">'
          +ACCENTS.map(function(a){return '<button class="tw-swatch" data-a="'+a[0]+'" style="background:'+a[1]+'" aria-pressed="'+(TWEAKS.accent===a[0])+'" aria-label="'+a[0]+'"></button>';}).join('')+'</div></div>'
        +'<div class="tw-row"><div class="tw-between"><span class="tw-label">Tamaño de texto</span><span class="tw-val" id="tw-tsval">'+Math.round(TWEAKS.textScale*100)+'%</span></div>'
          +'<input type="range" class="tw-range" id="tw-ts" min="0.9" max="1.4" step="0.05" value="'+TWEAKS.textScale+'"></div>'
        +'<div class="tw-row"><div class="tw-between"><span class="tw-label">Reto express · puntos</span><span class="tw-val" id="tw-rpval">+'+TWEAKS.retoPoints+'</span></div>'
          +'<input type="range" class="tw-range" id="tw-rp" min="10" max="50" step="5" value="'+TWEAKS.retoPoints+'"></div>'
        +'<div class="tw-row"><div class="tw-between"><span class="tw-label">Estilo píxel (retro)</span>'
          +'<button class="toggle" id="tw-pixel" role="switch" aria-checked="'+TWEAKS.pixel+'"></button></div></div>'
        +'<div class="tw-row"><div class="tw-between"><span class="tw-label">Ranking de tribus</span>'
          +'<button class="toggle" id="tw-rank" role="switch" aria-checked="'+TWEAKS.showRanking+'"></button></div></div>';

      document.getElementById('tw-close').onclick=function(){ hide(); window.parent.postMessage({type:'__edit_mode_dismissed'},'*'); };
      panel.querySelectorAll('#tw-theme .seg__b').forEach(function(b){ b.onclick=function(){ persist({dark:b.dataset.d==='1'}); }; });
      panel.querySelectorAll('#tw-accent .tw-swatch').forEach(function(b){ b.onclick=function(){ persist({accent:b.dataset.a}); }; });
      var ts=document.getElementById('tw-ts'); ts.oninput=function(){ document.getElementById('tw-tsval').textContent=Math.round(ts.value*100)+'%'; };
      ts.onchange=function(){ persist({textScale:+ts.value}); };
      var rp=document.getElementById('tw-rp'); rp.oninput=function(){ document.getElementById('tw-rpval').textContent='+'+rp.value; };
      rp.onchange=function(){ persist({retoPoints:+rp.value}); };
      document.getElementById('tw-rank').onclick=function(){ persist({showRanking:!TWEAKS.showRanking}); };
      document.getElementById('tw-pixel').onclick=function(){ persist({pixel:!TWEAKS.pixel}); };
    }
    function show(){ build(); panel.classList.remove('hidden'); }
    function hide(){ panel.classList.add('hidden'); }

    window.addEventListener('message',function(e){
      var d=e.data||{};
      if(d.type==='__activate_edit_mode') show();
      else if(d.type==='__deactivate_edit_mode') hide();
    });
    window.parent.postMessage({type:'__edit_mode_available'},'*');

    // apply persisted defaults once the app is ready
    (function waitApp(n){ if(window.__fit&&window.__fit.applyTweaks){ apply(); } else if(n<40){ setTimeout(function(){waitApp(n+1);},50); } })(0);
  })();
  </script>
