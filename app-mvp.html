document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

r(--font)}\n.tab svg{width:28px;height:28px}\n.tab.is-active{color:var(--primary);background:var(--primary-weak)}\n/* achievement */\n.ach{border:1px solid var(--border);border-radius:var(--r-m);padding:var(--sp2);background:var(--surface);text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:transform .12s ease}\n.ach:active{transform:scale(.97)}\n.ach__ic{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:var(--primary-weak);color:var(--primary-strong)}\n.ach__ic svg{width:28px;height:28px}\n.ach--locked{opacity:.62;cursor:default}\n.ach--locked .ach__ic{background:var(--surface-2);color:var(--text-2)}\n.ach--express .ach__ic{background:var(--challenge-weak);color:var(--challenge-strong)}\n.ach--team{border-color:var(--social)}\n.ach--team .ach__ic{background:var(--social-weak);color:var(--social-strong)}\n.ach__name{font-weight:800;font-size:16px}.ach__cond{font-size:13px;color:var(--text-2)}\n.achgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}\n/* exercise */\n.dots{display:flex;gap:8px}\n.dot{width:30px;height:30px;border-radius:50%;border:2px solid var(--primary);display:flex;align-items:center;justify-content:center;font:800 13px var(--font);color:var(--primary);cursor:pointer;background:transparent;transition:transform .12s ease}\n.dot:active{transform:scale(.9)}\n.dot.is-done{background:var(--primary);color:var(--text-inv)}\n.dot.is-static{cursor:default}\n.check{width:30px;height:30px;border-radius:50%;background:var(--success);color:#fff;display:flex;align-items:center;justify-content:center;flex:none}\n.check svg{width:20px;height:20px;animation:pop .4s ease}\n/* feed */\n.fi{display:flex;gap:12px;padding:var(--sp2);border:1px solid var(--border);border-radius:var(--r-m);background:var(--surface);align-items:flex-start}\n.fi--new{animation:slideDown .45s ease}\n.fi--team{border-color:var(--social);background:linear-gradient(180deg,var(--social-weak),var(--surface))}\n.fi__av{flex:none}\n.fi__ach{display:flex;align-items:center;gap:10px;margin:8px 0;padding:8px 10px;border-radius:12px;background:var(--surface-2)}\n.fi__ai{width:34px;height:34px;border-radius:10px;background:var(--primary-weak);color:var(--primary-strong);display:flex;align-items:center;justify-content:center;flex:none}\n.fi__ai svg{width:20px;height:20px}\n.cheer{appearance:none;border:1px solid var(--border);background:var(--surface-2);cursor:pointer;border-radius:var(--r-pill);\n  min-height:44px;padding:0 16px;font:700 14px var(--font);color:var(--text);display:inline-flex;align-items:center;gap:8px}\n.cheer.is-on{background:var(--primary-weak);border-color:var(--primary);color:var(--primary-strong)}\n.cheer.bump{animation:bump .3s ease}\n.cheer__n{font-weight:800;color:var(--primary)}\n/* ranking */\n.rk{display:flex;align-items:center;gap:12px;padding:12px var(--sp2);border-radius:var(--r-m);background:var(--surface);border:1px solid var(--border);transition:transform .45s cubic-bezier(.4,1.1,.5,1)}\n.rk--me{border-color:var(--primary);background:var(--primary-weak)}\n.rk__pos{width:30px;font-weight:800;color:var(--text-2);text-align:center}\n.rk__pts{margin-left:auto;font-weight:800}\n/* overlay card */\n.ov{position:relative;border-radius:var(--r-l);background:var(--surface);border:1px solid var(--border);padding:var(--sp3);text-align:center;overflow:hidden}\n.ov__x{position:absolute;top:14px;right:14px;width:48px;height:48px;border-radius:50%;border:1px solid var(--border);background:var(--surface-2);cursor:pointer;font-size:22px;color:var(--text);display:flex;align-items:center;justify-content:center;z-index:2}\n.timer{font-size:60px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.03em;color:var(--challenge-strong);margin:8px 0}\n.rest{font-size:64px;font-weight:800;color:var(--primary);font-variant-numeric:tabular-nums;margin:4px 0}\n.ring{width:150px;height:150px;margin:0 auto;display:block}\n.ring circle{fill:none;stroke-width:9}.ring .bg{stroke:var(--surface-2)}\n.ring .fg{stroke:var(--challenge);stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset 1s linear}\n.achmini{aspect-ratio:1;border-radius:12px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;background:var(--surface);color:var(--primary-strong)}\n.achmini svg{width:26px;height:26px}\n.achmini.lk{background:var(--surface-2);color:var(--text-2);opacity:.6}\n/* avatar editor */\n.opt{width:54px;height:54px;border-radius:14px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--surface);font-size:22px}\n.opt[aria-pressed=\"true\"]{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-weak)}\n.grid{display:flex;gap:10px;flex-wrap:wrap}\n.opt-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px var(--sp2);border-bottom:1px solid var(--border)}\n.opt-row:last-child{border:0}\n/* qr */\n.qrwrap{aspect-ratio:1;border-radius:var(--r-m);background:var(--surface-2);border:2px dashed var(--primary);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}\n.qrwrap>svg{width:30%;height:30%;color:var(--text-2)}\n.scanline{position:absolute;left:8%;right:8%;height:3px;background:var(--primary);box-shadow:0 0 12px var(--primary);animation:scan 2.4s ease-in-out infinite}\n/* exercise list item */\n.exh{display:flex;gap:12px;align-items:center;padding:var(--sp1);border:1px solid var(--border);border-radius:var(--r-m);background:var(--surface);cursor:pointer;transition:transform .12s ease,border-color .12s ease}\n.exh:hover{border-color:var(--primary)}\n.exh:active{transform:scale(.99)}\n.exh__thumb{flex:none;width:104px;aspect-ratio:4/3;border-radius:12px;background:linear-gradient(135deg,var(--primary-weak),var(--surface-2));display:flex;align-items:center;justify-content:center;color:var(--primary-strong);border:1px solid var(--border);position:relative}\n.exh__thumb svg{width:30px;height:30px}\n.exh__thumb::after{content:\"▶\";position:absolute;right:6px;bottom:5px;font-size:11px;color:var(--text-inv);background:var(--primary);width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;padding-left:2px}\n/* video player */\n.video{aspect-ratio:4/3;border-radius:var(--r-m);background:linear-gradient(135deg,var(--primary-weak),var(--surface-2));\n  display:flex;align-items:center;justify-content:center;color:var(--primary-strong);position:relative;overflow:hidden;border:1px solid var(--border)}\n.video__play{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;color:var(--primary-strong);cursor:pointer;border:0;transition:transform .12s ease}\n.video__play:active{transform:scale(.92)}\n.video__play svg{width:30px;height:30px;margin-left:3px}\n.video__tag{position:absolute;left:10px;top:10px}\n.video__bar{position:absolute;left:0;right:0;bottom:0;height:6px;background:rgba(0,0,0,.18)}\n.video__bar>i{display:block;height:100%;width:0;background:var(--primary);transition:width .25s linear}\n.video__time{position:absolute;right:10px;bottom:12px;font:800 13px var(--font);color:#fff;background:rgba(0,0,0,.45);padding:3px 8px;border-radius:var(--r-pill)}\n.video.playing{background:#0b1a18}\n.reps{display:flex;gap:10px}\n.reps__box{flex:1;text-align:center;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-m);padding:12px 8px}\n.reps__n{font:800 26px var(--font);color:var(--primary);letter-spacing:-.02em;line-height:1.1}\n.reps__l{font:700 12px var(--font);text-transform:uppercase;letter-spacing:.06em;color:var(--text-2)}\n.section-h{font:800 13px var(--font);letter-spacing:.08em;text-transform:uppercase;color:var(--text-2);margin:4px 0 0}\n.lvl{display:inline-flex;align-items:center;gap:8px;font-weight:800}\n.lvl svg{width:20px;height:20px}\n.lvlbar{flex:1;min-width:60px;height:10px;border-radius:var(--r-pill);background:var(--surface-2);overflow:hidden}\n.lvlbar>i{display:block;height:100%;background:var(--primary);transition:width .5s ease}\n.retocard{border:2px solid var(--challenge);border-radius:var(--r-l);padding:var(--sp2);background:linear-gradient(180deg,var(--challenge-weak),var(--surface))}\n.dayrow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}\n.day{min-height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;font:700 14px var(--font);color:var(--text-2);background:var(--surface-2);border:1px solid var(--border)}\n.day.is-today{background:var(--primary-weak);color:var(--primary-strong);border-color:var(--primary)}\n.wkseg{display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:6px}\n.wk{appearance:none;border:1px solid var(--border);background:var(--surface);cursor:pointer;border-radius:10px;min-height:46px;font:700 14px var(--font);color:var(--text-2)}\n.wk[aria-selected=\"true\"]{background:var(--primary);color:var(--text-inv);border-color:var(--primary)}\n\n/* ===== anims ===== */\n@keyframes shimmer{to{transform:translateX(100%)}}\n@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(40,170,120,.55)}70%{box-shadow:0 0 0 12px rgba(40,170,120,0)}100%{box-shadow:0 0 0 0 rgba(40,170,120,0)}}\n@keyframes slideDown{from{transform:translateY(-16px)}to{transform:none}}\n@keyframes fadeNew{0%,70%{opacity:1}100%{opacity:0;transform:scale(.9)}}\n@keyframes bump{50%{transform:scale(1.18)}}\n@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.25)}100%{transform:scale(1)}}\n@keyframes flyup{0%{opacity:0;transform:translateY(8px)}20%{opacity:1}100%{opacity:0;transform:translateY(-44px)}}\n@keyframes scan{0%,100%{top:14%}50%{top:82%}}\n@keyframes pulseBadge{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}\n.pulseBadge{animation:pulseBadge 1.8s ease-in-out infinite}\n@keyframes screenIn{from{transform:translateY(10px)}to{transform:none}}\n@keyframes ovIn{from{transform:translateY(24px)}to{transform:none}}\n@keyframes achPop{from{transform:scale(.96)}to{transform:scale(1)}}\n@media (prefers-reduced-motion:reduce){\n  *{animation:none!important;transition-duration:.001s!important}\n  .skel.shimmer::after{display:none}\n}\n\n/* ===== responsive app shell ===== */\nbody{background:#aab8b4;display:flex;align-items:center;justify-content:center}\n[data-theme=\"dark\"] body,body[data-theme=\"dark\"]{background:#05201d}\n.stage{width:100%;height:100%;height:100dvh;display:flex;align-items:center;justify-content:center;padding:0}\n.app{position:relative;width:100%;max-width:440px;height:100dvh;background:var(--bg);color:var(--text);\n  display:flex;flex-direction:column;overflow:hidden}\n@media (min-width:480px){\n  .stage{padding:24px}\n  .app{height:min(100dvh - 48px, 940px);border-radius:34px;border:1px solid var(--border);\n    box-shadow:0 24px 70px rgba(0,0,0,.32);overflow:hidden}\n}\n/* header */\n.appbar{flex:none;padding:12px var(--sp2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface);min-height:64px}\n.hd-av{flex:none;line-height:0;width:46px;height:46px;border-radius:50%;overflow:hidden;border:2px solid var(--primary-weak);padding:0;background:transparent;cursor:pointer}\n.hd-av svg{display:block}\n.appbar__t{flex:1;font-weight:800;font-size:18px}\n.iconbtn{flex:none;width:48px;height:48px;border-radius:50%;border:1px solid var(--border);background:var(--surface-2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center}\n.iconbtn svg{width:24px;height:24px}\n/* scroll region */\n.scr{flex:1;overflow-y:auto;overflow-x:hidden;padding:var(--sp2);display:flex;flex-direction:column;gap:var(--sp2);\n  scrollbar-width:thin;scrollbar-color:var(--border) transparent;animation:screenIn .28s ease}\n.scr::-webkit-scrollbar{width:10px}\n.scr::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;border:3px solid var(--surface)}\n.tabbar{flex:none}\n/* overlay backdrop (modals & guided flows) */\n.backdrop{position:absolute;inset:0;background:rgba(6,18,16,.55);display:flex;align-items:flex-end;justify-content:center;\n  z-index:40;padding:0}\n.backdrop.center{align-items:center;padding:18px}\n.sheet{width:100%;max-height:94%;overflow-y:auto;background:var(--bg);color:var(--text);border-radius:var(--r-l) var(--r-l) 0 0;\n  padding:var(--sp2);display:flex;flex-direction:column;gap:var(--sp2);animation:ovIn .3s ease}\n.backdrop.center .sheet{border-radius:var(--r-l);max-width:400px;animation:achPop .26s ease}\n/* full overlay screen (reto guided ¾, qr) */\n.fullov{position:absolute;inset:0;z-index:50;background:var(--bg);color:var(--text);display:flex;flex-direction:column;animation:ovIn .3s ease}\n.fullov .scr{justify-content:center}\n/* fly-up points */\n.flyup{position:absolute;font:800 24px var(--font);color:var(--success);pointer-events:none;z-index:60;animation:flyup 1.1s ease forwards}\n/* toast */\n.toast{position:absolute;left:50%;transform:translateX(-50%);bottom:96px;z-index:55;display:flex;align-items:center;gap:12px;\n  background:var(--surface);border:1px solid var(--border);border-left:5px solid var(--success);\n  border-radius:var(--r-m);padding:14px var(--sp2);box-shadow:var(--shadow);width:calc(100% - 32px);max-width:380px;animation:slideDown .35s ease}\n.toast svg{width:24px;height:24px;color:var(--success);flex:none}\n.hidden{display:none!important}\n\n/* ===== Tweaks panel ===== */\n.tweaks{position:fixed;top:16px;right:16px;width:300px;max-height:calc(100dvh - 32px);overflow-y:auto;z-index:1000;\n  background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--r-l);\n  box-shadow:0 24px 70px rgba(0,0,0,.45);padding:var(--sp2);display:flex;flex-direction:column;gap:var(--sp2);\n  font-family:var(--font);scrollbar-width:thin}\n.tweaks.hidden{display:none!important}\n.tweaks__h{display:flex;align-items:center;justify-content:space-between}\n.tweaks__h b{font-size:18px}\n.tw-row{display:flex;flex-direction:column;gap:8px}\n.tw-row>.tw-label{font:800 12px var(--font);letter-spacing:.06em;text-transform:uppercase;color:var(--text-2)}\n.tw-sw{display:flex;gap:8px;flex-wrap:wrap}\n.tw-swatch{width:42px;height:42px;border-radius:12px;border:2px solid var(--border);cursor:pointer;position:relative}\n.tw-swatch[aria-pressed=\"true\"]{border-color:var(--text);box-shadow:0 0 0 3px var(--primary-weak)}\n.tw-range{width:100%;accent-color:var(--primary);height:28px}\n.tw-val{font:800 14px var(--font);color:var(--primary)}\n.tw-between{display:flex;align-items:center;justify-content:space-between;gap:12px}\n.tweaks .seg{min-height:42px}\n.tweaks .seg__b{font-size:13px}\n\n/* ===== Pixel icons (UI Asset Pack by Samuel Tomé) ===== */\n.pxi{flex:none;display:inline-block;object-fit:contain;vertical-align:middle;width:24px;height:24px;\n  image-rendering:pixelated;image-rendering:crisp-edges;-webkit-user-drag:none;user-select:none}\n.btn .pxi{width:22px;height:22px}\n.badge .pxi{width:16px;height:16px}\n.pill .pxi{width:16px;height:16px}\n.seg__b .pxi{width:18px;height:18px}\n.tab .pxi{width:28px;height:28px}\n.ach__ic .pxi{width:30px;height:30px}\n.check .pxi{width:20px;height:20px}\n.fi__ai .pxi{width:20px;height:20px}\n.lvl .pxi{width:18px;height:18px}\n.iconbtn .pxi{width:24px;height:24px}\n.exh__thumb .pxi{width:30px;height:30px}\n.video__play .pxi{width:28px;height:28px;margin-left:2px}\n.qrwrap .pxi{width:34%;height:34%}\n/* light icons on solid colored / dark surfaces */\n.btn:not(.btn--soft):not(.btn--ghost) .pxi,\n.check .pxi,\n.seg__b[aria-selected=\"true\"] .pxi{filter:brightness(0) invert(1)}\n/* dark theme: lift icons to white on dark surfaces */\n[data-theme=\"dark\"] .pxi{filter:brightness(0) invert(1)}\n[data-theme=\"dark\"] .video__play .pxi{filter:none}\n\n/* ===== Pixel skin — retro game-UI to match the icon pack ===== */\n[data-skin=\"pixel\"]{\n  --font-pixel:\"Pixelify Sans\",\"Silkscreen\",ui-monospace,monospace;\n  --r-s:2px;--r-m:4px;--r-l:6px;--r-pill:4px;\n  --shadow:4px 4px 0 rgba(16,32,29,.16);\n  --hard:rgba(16,32,29,.22);\n}\n[data-skin=\"pixel\"][data-theme=\"dark\"]{--hard:rgba(0,0,0,.5)}\n/* chunky pixel grid wash behind the app */\n[data-skin=\"pixel\"] .app{\n  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);\n  background-size:18px 18px;background-position:-1px -1px;background-blend-mode:soft-light;\n}\n/* text stays in the legible humanist font — only the icons + chrome are pixel art */\n[data-skin=\"pixel\"] .h1{letter-spacing:-.02em}\n/* square everything that was pill / heavily rounded, give chunky borders */\n[data-skin=\"pixel\"] .panel,[data-skin=\"pixel\"] .ach,[data-skin=\"pixel\"] .fi,\n[data-skin=\"pixel\"] .rk,[data-skin=\"pixel\"] .exh,[data-skin=\"pixel\"] .ov,\n[data-skin=\"pixel\"] .toast,[data-skin=\"pixel\"] .video,[data-skin=\"pixel\"] .qrwrap,\n[data-skin=\"pixel\"] .tweaks{border-width:2px;border-style:solid}\n[data-skin=\"pixel\"] .panel,[data-skin=\"pixel\"] .ach,[data-skin=\"pixel\"] .fi,\n[data-skin=\"pixel\"] .rk,[data-skin=\"pixel\"] .exh{box-shadow:var(--shadow)}\n[data-skin=\"pixel\"] .badge,[data-skin=\"pixel\"] .pill,[data-skin=\"pixel\"] .chip,\n[data-skin=\"pixel\"] .seg,[data-skin=\"pixel\"] .seg__ind,[data-skin=\"pixel\"] .seg__b,\n[data-skin=\"pixel\"] .tab,[data-skin=\"pixel\"] .cheer,[data-skin=\"pixel\"] .prog,\n[data-skin=\"pixel\"] .prog>i,[data-skin=\"pixel\"] .lvlbar,[data-skin=\"pixel\"] .lvlbar>i,\n[data-skin=\"pixel\"] .ach__ic,[data-skin=\"pixel\"] .fi__ai,[data-skin=\"pixel\"] .fi__ach,\n[data-skin=\"pixel\"] .check,[data-skin=\"pixel\"] .wk,[data-skin=\"pixel\"] .day,\n[data-skin=\"pixel\"] .achmini{border-radius:3px}\n/* pixel buttons: hard offset shadow, press = nudge into the shadow */\n[data-skin=\"pixel\"] .btn{border-radius:3px;box-shadow:3px 3px 0 var(--hard)}\n[data-skin=\"pixel\"] .btn:hover{filter:none}\n[data-skin=\"pixel\"] .btn:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--hard)}\n[data-skin=\"pixel\"] .btn--ghost{box-shadow:3px 3px 0 var(--hard)}\n/* squared toggles + iconbtns */\n[data-skin=\"pixel\"] .toggle{border-radius:3px}\n[data-skin=\"pixel\"] .toggle::after{border-radius:2px}\n[data-skin=\"pixel\"] .iconbtn,[data-skin=\"pixel\"] .ov__x{border-radius:4px;border-width:2px}\n[data-skin=\"pixel\"] .tab.is-active{border-radius:3px}\n/* square the avatar portraits for a roster / game-profile feel */\n[data-skin=\"pixel\"] .av-photo{border-radius:3px!important;box-shadow:0 0 0 2px var(--border)}\n[data-skin=\"pixel\"] .av-photo img{image-rendering:auto}\n/* tabbar gets a solid top rule */\n[data-skin=\"pixel\"] .tabbar{border-top-width:2px}\n[data-skin=\"pixel\"] .appbar{border-bottom-width:2px}\n/* crisper focus */\n[data-skin=\"pixel\"] :focus-visible{outline-width:3px;border-radius:2px}\n<\u002Fstyle>\n<style>\n  /* MVP: 3-tab navegación base (Perfil · Ejercicio · Cámara) */\n  .tabbar{grid-template-columns:repeat(3,1fr)}\n  /* base-avatar picker */\n  .avbase{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}\n  .avbase__b{appearance:none;border:3px solid var(--border);background:var(--surface);border-radius:50%;\n    padding:4px;cursor:pointer;line-height:0;transition:transform .12s ease}\n  .avbase__b:active{transform:scale(.94)}\n  .avbase__b[aria-pressed=\"true\"]{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-weak)}\n  [data-skin=\"pixel\"] .avbase__b{border-radius:6px}\n  [data-skin=\"pixel\"] .avbase__b[aria-pressed=\"true\"]{box-shadow:3px 3px 0 var(--hard)}\n<\u002Fstyle>\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n<\u002Fhead>\n<body data-theme=\"light\">\n  <div class=\"stage\">\n    <div class=\"app\" id=\"app\" role=\"application\" aria-label=\"FitSanitario MVP\"><\u002Fdiv>\n  <\u002Fdiv>\n  \n  <aside class=\"tweaks hidden\" id=\"tweaks\" aria-label=\"Tweaks\"><\u002Faside>\n  <script src=\"fd741897-d8c1-4dda-9ff3-d684b1941600\"><\u002Fscript>\n  <script src=\"fc06831f-0b01-47f5-83ba-c0a9b7fbfd20\"><\u002Fscript>\n  <script>\n  (function(){\n    var TWEAKS = /*EDITMODE-BEGIN*/{\n      \"accent\": \"teal\",\n      \"textScale\": 1,\n      \"dark\": false,\n      \"pixel\": true,\n      \"showRanking\": true\n    }/*EDITMODE-END*/;\n\n    var ACCENTS=[['teal','#0A6E63'],['indigo','#4842B0'],['verde','#1E7A4D'],['ambar','#A85E08']];\n    var panel=document.getElementById('tweaks');\n\n    function apply(){ if(window.__fit&&window.__fit.applyTweaks) window.__fit.applyTweaks(TWEAKS); }\n    function persist(edits){ Object.assign(TWEAKS,edits); window.parent.postMessage({type:'__edit_mode_set_keys',edits:edits},'*'); apply(); build(); }\n\n    function build(){\n      panel.innerHTML=''\n        +'<div class=\"tweaks__h\"><b>Tweaks<\u002Fb><button class=\"iconbtn\" id=\"tw-close\" aria-label=\"Cerrar\">✕<\u002Fbutton><\u002Fdiv>'\n        +'<div class=\"tw-row\"><span class=\"tw-label\">Tema<\u002Fspan>'\n          +'<div class=\"seg\" id=\"tw-theme\"><span class=\"seg__ind\" style=\"left:5px;width:calc(50% - 5px);transform:translateX('+(TWEAKS.dark?100:0)+'%)\"><\u002Fspan>'\n          +'<button class=\"seg__b\" data-d=\"0\" aria-selected=\"'+(!TWEAKS.dark)+'\">Claro<\u002Fbutton>'\n          +'<button class=\"seg__b\" data-d=\"1\" aria-selected=\"'+(TWEAKS.dark)+'\">Oscuro<\u002Fbutton><\u002Fdiv><\u002Fdiv>'\n        +'<div class=\"tw-row\"><span class=\"tw-label\">Color de acento<\u002Fspan><div class=\"tw-sw\" id=\"tw-accent\">'\n          +ACCENTS.map(function(a){return '<button class=\"tw-swatch\" data-a=\"'+a[0]+'\" style=\"background:'+a[1]+'\" aria-pressed=\"'+(TWEAKS.accent===a[0])+'\" aria-label=\"'+a[0]+'\"><\u002Fbutton>';}).join('')+'<\u002Fdiv><\u002Fdiv>'\n        +'<div class=\"tw-row\"><div class=\"tw-between\"><span class=\"tw-label\">Tamaño de texto<\u002Fspan><span class=\"tw-val\" id=\"tw-tsval\">'+Math.round(TWEAKS.textScale*100)+'%<\u002Fspan><\u002Fdiv>'\n          +'<input type=\"range\" class=\"tw-range\" id=\"tw-ts\" min=\"0.9\" max=\"1.4\" step=\"0.05\" value=\"'+TWEAKS.textScale+'\"><\u002Fdiv>'\n        +'<div class=\"tw-row\"><div class=\"tw-between\"><span class=\"tw-label\">Estilo píxel (retro)<\u002Fspan>'\n          +'<button class=\"toggle\" id=\"tw-pixel\" role=\"switch\" aria-checked=\"'+TWEAKS.pixel+'\"><\u002Fbutton><\u002Fdiv><\u002Fdiv>'\n        +'<div class=\"tw-row\"><div class=\"tw-between\"><span class=\"tw-label\">Ranking de tribus<\u002Fspan>'\n          +'<button class=\"toggle\" id=\"tw-rank\" role=\"switch\" aria-checked=\"'+TWEAKS.showRanking+'\"><\u002Fbutton><\u002Fdiv><\u002Fdiv>';\n\n      document.getElementById('tw-close').onclick=function(){ hide(); window.parent.postMessage({type:'__edit_mode_dismissed'},'*'); };\n      panel.querySelectorAll('#tw-theme .seg__b').forEach(function(b){ b.onclick=function(){ persist({dark:b.dataset.d==='1'}); }; });\n      panel.querySelectorAll('#tw-accent .tw-swatch').forEach(function(b){ b.onclick=function(){ persist({accent:b.dataset.a}); }; });\n      var ts=document.getElementById('tw-ts'); ts.oninput=function(){ document.getElementById('tw-tsval').textContent=Math.round(ts.value*100)+'%'; };\n      ts.onchange=function(){ persist({textScale:+ts.value}); };\n      document.getElementById('tw-rank').onclick=function(){ persist({showRanking:!TWEAKS.showRanking}); };\n      document.getElementById('tw-pixel').onclick=function(){ persist({pixel:!TWEAKS.pixel}); };\n    }\n    function show(){ build(); panel.classList.remove('hidden'); }\n    function hide(){ panel.classList.add('hidden'); }\n\n    window.addEventListener('message',function(e){\n      var d=e.data||{};\n      if(d.type==='__activate_edit_mode') show();\n      else if(d.type==='__deactivate_edit_mode') hide();\n    });\n    window.parent.postMessage({type:'__edit_mode_available'},'*');\n\n    (function waitApp(n){ if(window.__fit&&window.__fit.applyTweaks){ apply(); } else if(n<40){ setTimeout(function(){waitApp(n+1);},50); } })(0);\n  })();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
